
palette = "catppuccin_mocha"

format = """
$os$directory$git_branch$git_state\
$fill\
$git_status$cmd_duration$time
$character"""

right_format = ""
add_newline = true

c.disabled          = true
cmake.disabled      = true
haskell.disabled    = true
python.disabled     = true
ruby.disabled       = true
rust.disabled       = true
perl.disabled       = true
package.disabled    = true
lua.disabled        = true
nodejs.disabled     = true
java.disabled       = true
golang.disabled     = true
conda.disabled      = true

[os]
disabled = false
format   = "[$symbol]($style) "
style    = "fg:overlay1"

[os.symbols]
Arch   = " "
Linux  = " "

[directory]
format            = "[$path]($style)[$read_only]($read_only_style) "
style             = "fg:lavender bold"
read_only         = " ¾░īŠ"
read_only_style   = "fg:red"
truncation_length = 4
truncate_to_repo  = false
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ"
"Downloads" = "¾░ćÜ"
"Pictures"  = "¾░ēÅ"
"Music"     = "¾░Äå"
"Videos"    = "¾░Ģ¦"
"Desktop"   = "¾░ćś"
"~"         = "~"

[git_branch]
format   = "[$symbol$branch(:$remote_branch)]($style) "
symbol   = " "
style    = "fg:green"
truncation_length = 20

[git_state]
format = "[$state($progress_current/$progress_total)]($style) "
style  = "fg:yellow bold"

[git_status]
format      = "([$all_status$ahead_behind]($style) )"
style       = "fg:yellow"
conflicted  = "¾░×ć "
ahead       = "¾░üØ${count} "
behind      = "¾░üģ${count} "
diverged    = "¾░╣║ "
up_to_date  = ""
untracked   = "¾░ŗŚ${count} "
stashed     = "¾░ÅŚ "
modified    = "¾░ÅŁ${count} "
staged      = "¾░ÉĢ${count} "
renamed     = "¾░æĢ${count} "
deleted     = "¾░å┤${count} "

[fill]
symbol = " "

[time]
disabled      = false
format        = "[$time]($style) "
style         = "fg:overlay1"
time_format   = "%H:%M"
use_12hr      = false

[cmd_duration]
min_time  = 1
format    = "[¾▒”¤ $duration]($style) "
style     = "fg:peach"
disabled  = false

[character]
success_symbol = "[ŌØ»](fg:mauve bold)"
error_symbol   = "[ŌØ»](fg:red bold)"
vicmd_symbol   = "[ŌØ«](fg:green bold)"

