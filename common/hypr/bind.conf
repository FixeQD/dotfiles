$mainMod = SUPER

bind = $mainMod, RETURN, exec, ghostty
bind = CTRL_ALT, T, exec, ghostty --class floating
bind = $mainMod, Q, killactive
bind = $mainMod, SPACE, exec, anyrun
bind = $mainMod, F11, fullscreen
bind = $mainMod, E, exec, dolphin
bind = $mainMod, B, exec, zen-browser
bind = $mainMod SHIFT, B, exec, zen-browser --private-window
bind = $mainMod, T, exec, Telegram
bind = $mainMod, C, exec, zeditor
bind = $mainMod, O, exec, obs
bind = $mainMod, L, exec, hyprlock

bind = $mainMod, S, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit
bind = $mainMod, Tab, swapnext

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, right, resizeactive, 10 0
bind = $mainMod SHIFT, left, resizeactive, -10 0
bind = $mainMod SHIFT, up, resizeactive, 0 -10
bind = $mainMod SHIFT, down, resizeactive, 0 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, X, exec, ~/.config/rofi/scripts/powermenu.sh
bind = $mainMod, R, exec, ~/.config/rofi/scripts/run.sh
bind = $mainMod, Z, exec, ~/.config/rofi/scripts/filebrowser.sh
bind = $mainMod, V, exec, ~/.config/rofi/scripts/clipboard.sh
bind = $mainMod SHIFT, SPACE, exec, ~/.config/rofi/scripts/emoji.sh
bind = $mainMod, W, exec, ~/.config/rofi/scripts/wifi.sh

bind = $mainMod SHIFT, W, exec, ~/.config/swww/picker.sh smooth
bind = $mainMod ALT, W, exec, ~/.config/swww/randomize.sh 0 random

bind = $mainMod SHIFT, S, exec, \
    FILE=~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png; \
    grim -g "$(slurp)" - | tee >(wl-copy) | \
    { cat > "$FILE" && [ -s "$FILE" ] && \
    notify-send -i "$FILE" -t 2000 "Screenshot saved" || rm -f "$FILE"; }

bind = , Print, exec, \
    FILE=~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png; \
    grim - | tee >(wl-copy) > "$FILE" && \
    notify-send -t 2000 "Screenshot saved"

bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/reload.sh

bind = $mainMod SHIFT ALT, D, exec, sleep 0.5 && hyprctl dispatch dpms off
bind = $mainMod CTRL, D, exec, hyprctl dispatch dpms on

bind = $mainMod, N, exec, swaync-client -t

bind = $mainMod SHIFT ALT, P, exec, shutdown -h now
bind = $mainMod SHIFT ALT, R, exec, reboot
bind = $mainMod SHIFT ALT, L, exit

bind = , XF86AudioRaiseVolume, exec, \
    pamixer -i 5 && \
    notify-send -h int:value:$(pamixer --get-volume) -t 800 -r 2593 \
    "Volume $(pamixer --get-volume)%"

bind = , XF86AudioLowerVolume, exec, \
    pamixer -d 5 && \
    notify-send -h int:value:$(pamixer --get-volume) -t 800 -r 2593 \
    "Volume $(pamixer --get-volume)%"

bind = , XF86AudioMute, exec, \
    pamixer -t && \
    notify-send -t 800 -r 2593 \
    "$(pamixer --get-mute | grep -q true && echo '🔇 Muted' || echo '🔊 Unmuted')"

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind = , XF86MonBrightnessUp, exec, \
    brightnessctl set 5%+ && \
    notify-send -h int:value:$(brightnessctl -m | cut -d, -f4 | tr -d %) \
    -t 800 -r 2594 "Brightness $(brightnessctl -m | cut -d, -f4)"

bind = , XF86MonBrightnessDown, exec, \
    brightnessctl set 5%- && \
    notify-send -h int:value:$(brightnessctl -m | cut -d, -f4 | tr -d %) \
    -t 800 -r 2594 "Brightness $(brightnessctl -m | cut -d, -f4)"
