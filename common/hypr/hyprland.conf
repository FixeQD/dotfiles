
monitor = eDP-1, 1920x1080@60, 0x0, 1.00

exec-once = waybar
exec-once = swww-daemon --format xrgb
exec-once = bash ~/.config/swww/randomize.sh 15 random
exec-once = wl-paste --watch cliphist store
exec-once = swaync
exec-once = hypridle
exec-once = bash ~/.config/eww/scripts/start.sh
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = bash ~/.config/hypr/scripts/nogaps.sh

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

source = ~/.config/hypr/bind.conf

input {
    kb_layout = pl
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus = false
    float_switch_override_focus = 2

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        drag_lock = false
        scroll_factor = 1.0
    }

    sensitivity = 0
    accel_profile = flat
}

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2

    col.active_border = rgba(cba6f7ff) rgba(89b4faff) rgba(94e2d5ff) rgba(a6e3a1ff) rgba(f9e2afff) rgba(fab387ff) rgba(f38ba8ff) 45deg
    col.inactive_border = rgba(313244aa)

    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true

    allow_tearing = false
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 0.94
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 24
        render_power = 3
        offset = 0 3
        color = rgba(1a1a2eee)
        color_inactive = rgba(1a1a2e88)
    }

    dim_inactive = true
    dim_strength = 0.06

    blur {
        enabled = true
        size = 9
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
        noise = 0.0117
        contrast = 0.90
        brightness = 0.82
        vibrancy = 0.22
        vibrancy_darkness = 0.0
        popups = true
        popups_ignorealpha = 0.2
    }
}

animations {
    enabled = true

    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = linear, 0, 0, 1, 1
    bezier = snappy, 0.15, 1, 0.25, 1

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, snappy

    animation = border, 1, 10, default
    animation = borderangle, 1, 80, linear, loop

    animation = fade, 1, 7, smoothIn
    animation = fadeDim, 1, 7, smoothIn

    animation = workspaces, 1, 5, snappy, slide
    animation = specialWorkspace, 1, 5, snappy, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
    force_split = 0
    split_width_multiplier = 1.0
}

master {
    new_status = master
    new_on_top = true
    mfact = 0.55
    orientation = left
}

gestures {
    gesture = 3, horizontal, workspace
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0

    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

    vrr = 0
    vfr = true

    animate_manual_resizes = true
    animate_mouse_windowdragging = true

    enable_swallow = true
    swallow_regex = ^(kitty|ghostty|Alacritty|foot)$
    swallow_exception_regex = ^(wev)$

    focus_on_activate = true
    disable_autoreload = false

}

binds {
    scroll_event_delay = 300
    workspace_back_and_forth = false
    allow_workspace_cycles = true
    pass_mouse_when_bound = false
}

xwayland {
    force_zero_scaling = true
}

windowrule = float on, match:class ^(file_progress|confirm|dialog|download|notification|error|splash|confirmreset)$
windowrule = float on, match:title ^(Open File|branchdialog|Volume Control|Picture-in-Picture|Sharing Indicator)$

windowrule = float on, match:class ^(Lxappearance|pavucontrol|pavucontrol-qt|viewnior|gucharmap|file-roller|keepassxc)$
windowrule = float on, match:class ^(org\.gnome\.Settings|gnome-font-viewer)$
windowrule = float on, match:class ^(dolphin|nemo|thunar|Pcmanfm)$
windowrule = float on, match:class ^(wdisplays|zathura)$
windowrule = float on, match:class .*\.exe$

windowrule = float on, stay_focused on, no_anim on, match:class ^(rofi)$

windowrule = fullscreen on, no_anim on, match:class ^(wlogout)$

windowrule = opacity 0.0 override 0.0 override, match:title ^swaync
windowrule = no_blur on, match:title ^swaync
windowrule = no_shadow on, match:title ^swaync
windowrule = no_focus on, match:title ^swaync

windowrule = float on, size 800 600, move 75% 44%, match:title ^(Volume Control)$

windowrule = move 0 0, match:title ^(Sharing Indicator)$

windowrule = float on, pin on, keep_aspect_ratio on, match:title ^(Picture-in-Picture)$

windowrule = no_focus on, no_initial_focus on, match:class ^(jetbrains-.*)$, match:title ^(win\d+)$

windowrule = opacity 0.95 override 0.85 override, match:class ^(com.mitchellh.ghostty|kitty|Alacritty|foot)$
windowrule = opacity 0.90 0.80, match:class ^(zeditor|Code)$
windowrule = opacity 0.90 0.80, match:class ^(firefox|zen-Browser)$

windowrule = workspace 2, match:class ^(firefox|Zen Browser|chromium)$
windowrule = workspace 3, match:class ^(Code|code-oss|zeditor)$
windowrule = workspace 4, match:class ^(discord|WebCord|vesktop)$
windowrule = workspace 5, match:class ^(Spotify|spotify)$

windowrule = float on, size 1200 900, center on, match:title ^(Media viewer)$

windowrule = immediate on, match:class ^(steam_app_.*)$
windowrule = immediate on, match:class ^(Minecraft\*)$

windowrule = float on, immediate on, stay_focused on, match:class ^(vmware)$
