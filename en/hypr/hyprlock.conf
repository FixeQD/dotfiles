
background {
    monitor =
    path = screenshot   # takes a screenshot instead of wallpaper — always works
    blur_passes = 4
    blur_size = 8
    noise = 0.008
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.3
}

general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 1
    disable_loading_bar = true
    ignore_empty_input = true
}

label {
    monitor =
    text = cmd[update:1000] date +"%H"
    color = rgba(205, 214, 244, 0.95)
    font_size = 180
    font_family = JetBrains Mono ExtraBold
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 0, 0, 0.5)
    position = -280, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%S" | awk '{print (int($1)%2==0) ? ":" : " "}'
    color = rgba(203, 166, 247, 0.9)
    font_size = 150
    font_family = JetBrains Mono ExtraBold
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%M"
    color = rgba(205, 214, 244, 0.95)
    font_size = 180
    font_family = JetBrains Mono ExtraBold
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 280, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A · %-d %B %Y"
    color = rgba(166, 173, 200, 0.7)
    font_size = 15
    font_family = JetBrains Mono
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.6)
    position = 0, -50
    halign = center
    valign = center
}

image {
    monitor =
    path = $HOME/.face
    size = 72
    border_size = 2
    border_color = rgba(203, 166, 247, 0.6)
    rounding = -1
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, -130
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 48
    outline_thickness = 0
    dots_size = 0.22
    dots_spacing = 0.4
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(255, 255, 255, 0.0)
    inner_color = rgba(255, 255, 255, 0.08)
    font_color = rgb(205, 214, 244)

    fade_on_empty = true
    fade_timeout = 2000
    rounding = 24

    placeholder_text = <span foreground="##6c7086" font_style="italic" font_size="small">Enter password</span>

    check_color = rgba(166, 227, 161, 0.9)
    fail_color = rgba(243, 139, 168, 0.0)
    fail_text = ""
    fail_timeout = 2000
    fail_transition = 300
    capslock_color = rgba(249, 226, 175, 0.9)

    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.4)
    shadow_boost = 1.2

    position = 0, -200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:100] cat /tmp/hyprlock_fail 2>/dev/null || echo ""
    color = rgba(243, 139, 168, 0.9)
    font_size = 12
    font_family = JetBrains Mono Bold
    position = 0, -258
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:500] bash -c '[ "$(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | head -1)" = "1" ] && echo "󰪛  CAPS LOCK" || echo ""'
    color = rgba(249, 226, 175, 0.85)
    font_size = 11
    font_family = JetBrains Mono Bold
    position = 0, -258
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:2000] ~/.config/hypr/scripts/music.sh
    color = rgba(166, 173, 200, 0.65)
    font_size = 12
    font_family = JetBrains Mono
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.6)
    position = 0, 52
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:5000] ~/.config/hypr/scripts/bottom_bar.sh
    color = rgba(166, 173, 200, 0.5)
    font_size = 11
    font_family = JetBrains Mono
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.6)
    position = -20, 20
    halign = right
    valign = bottom
}

label {
    monitor =
    text = cmd[update:3600000] ~/.config/hypr/scripts/greeting.sh
    color = rgba(166, 173, 200, 0.5)
    font_size = 11
    font_family = JetBrains Mono Medium
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.6)
    position = 20, 20
    halign = left
    valign = bottom
}
